<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a001a, #000000);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
  position: relative;
}

/* Floating hearts */
.heart {
  position: absolute;
  background: #ff4d88;
  transform: rotate(-45deg);
  animation: float linear infinite;
  opacity: 0.8;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  background: #ff4d88;
  border-radius: 50%;
}

.heart::before {
  top: -50%;
  left: 0;
  width: 100%;
  height: 100%;
}

.heart::after {
  left: 50%;
  top: 0;
  width: 100%;
  height: 100%;
}

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(0deg) scale(0.5);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  100% {
    transform: translateY(-120vh) rotate(360deg) scale(1);
    opacity: 0;
  }
}

/* Card */
.card {
  position: relative;
  padding: 80px 60px;
  border-radius: 25px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 80px rgba(255, 0, 120, 0.5);
  text-align: center;
  animation: fadeIn 1.5s ease;
  z-index: 1;
}

/* Heading */
h1 {
  font-size: 70px;
  background: linear-gradient(45deg, #ff4d88, #ff1a66, #ffb3de);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 40px;
  animation: glowText 2s infinite alternate;
}

@keyframes glowText {
  from { text-shadow: 0 0 20px #ff4d88; }
  to { text-shadow: 0 0 50px #ff1a66, 0 0 70px #ffb3de; }
}

/* Typing effect */
.typing {
  font-size: 50px;
  border-right: 4px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Static timer */
.timer {
  margin-top: 40px;
  font-size: 50px;
  background: linear-gradient(45deg, #ff4d88, #ff1a66, #ffb3de);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Fade in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Background glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: #ff2d75;
  filter: blur(200px);
  animation: moveGlow 8s infinite alternate;
}

@keyframes moveGlow {
  0% { transform: translate(-150px, -150px); }
  100% { transform: translate(200px, 200px); }
}
</style>

</head>
<body>

<div class="card">
  <h1>Hey Beautiful 💕</h1>
  <div class="typing">Happy Birthday 🎂</div>
  <div class="timer">⏳ 58 mins left</div>
</div>

<script>
// Create MANY floating hearts
for(let i=0; i<60; i++){
  let heart = document.createElement('div');
  heart.className = 'heart';

  // random position
  heart.style.left = Math.random() * window.innerWidth + 'px';

  // random size
  let size = 10 + Math.random() * 25;
  heart.style.width = size + 'px';
  heart.style.height = size + 'px';

  // random animation duration
  heart.style.animationDuration = (4 + Math.random() * 6) + 's';

  // random delay
  heart.style.animationDelay = Math.random() * 6 + 's';

  document.body.appendChild(heart);
}
</script>

</body>
</html>
