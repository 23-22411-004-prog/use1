<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  /* Background Image */
  background: url("image.jpg") no-repeat center center/cover;
}

/* Dark overlay */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  top: 0;
  left: 0;
}

/* Card */
.card {
  position: relative;
  padding: 50px 30px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255, 0, 120, 0.4);
  text-align: center;
  z-index: 1;
  animation: fadeIn 1.5s ease;
}

/* Heading */
h1 {
  font-size: 32px;
  color: #ff4d88;
  margin-bottom: 20px;
  animation: glowText 2s infinite alternate;
}

@keyframes glowText {
  from { text-shadow: 0 0 10px #ff4d88; }
  to { text-shadow: 0 0 25px #ff1a66, 0 0 40px #ff1a66; }
}

/* Typing effect */
.typing {
  font-size: 20px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Timer */
.timer {
  margin-top: 25px;
  font-size: 28px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); color: #ff4d88; }
  100% { transform: scale(1); }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="card">
  <h1>Hey Beautiful 💕</h1>

  <div class="typing">
    Happy Birthday 🎂
  </div>

  <div class="timer">
    ⏳ 59 mins left
  </div>
</div>

</body>
</html>
